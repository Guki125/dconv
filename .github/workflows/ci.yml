name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install LibreOffice (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libreoffice

      - name: Install LibreOffice (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask libreoffice

      - name: Install LibreOffice (Windows)
        if: runner.os == 'Windows'
        run: choco install libreoffice -y

      - name: Install dconv
        run: pip install -e .

      - name: Verify CLI is available
        run: dconv --help

      - name: Smoke test — to-pdf help
        run: dconv to-pdf --help

      - name: Smoke test — to-docx help
        run: dconv to-docx --help
